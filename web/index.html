<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Enterprise AI Assistant</title>
    <style>
      :root {
        --bg: #eef2f6;
        --side: #15232d;
        --surface: #ffffff;
        --soft: #f7f9fb;
        --ink: #17212b;
        --text: #283540;
        --muted: #667381;
        --line: #d8e0e8;
        --blue: #176b87;
        --blue-dark: #0f566d;
        --shadow: 0 18px 46px rgba(30, 45, 62, 0.12);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      }

      button, input, select {
        font: inherit;
      }

      .shell {
        min-height: 100vh;
        display: grid;
        grid-template-columns: 320px minmax(0, 1fr);
      }

      .sidebar {
        background: var(--side);
        color: #eef6f8;
        padding: 22px;
        display: grid;
        align-content: start;
        gap: 16px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .mark {
        width: 38px;
        height: 38px;
        border-radius: 8px;
        background: linear-gradient(135deg, #4fb2c8, #176b87 48%, #d58a42);
        display: grid;
        place-items: center;
        font-weight: 800;
      }

      .brand h1 {
        margin: 0;
        font-size: 18px;
        letter-spacing: 0;
      }

      .brand p {
        margin: 3px 0 0;
        color: #b8c8d0;
        font-size: 12px;
      }

      .side-card {
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.06);
        padding: 14px;
      }

      .side-card h2 {
        margin: 0 0 12px;
        font-size: 14px;
        letter-spacing: 0;
      }

      .metrics {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .metric {
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.14);
        padding: 10px;
      }

      .metric span {
        display: block;
        color: #aebfc8;
        font-size: 12px;
      }

      .metric b {
        display: block;
        color: #fff;
        font-size: 20px;
        margin-top: 2px;
      }

      .stack {
        margin-top: 12px;
        color: #c7d4da;
        font-size: 12px;
        line-height: 1.6;
      }

      .file-actions {
        display: grid;
        gap: 10px;
      }

      .auth-row {
        display: grid;
        gap: 8px;
      }

      input[type="file"] {
        width: 100%;
        min-height: 42px;
        color: #cddbe1;
        border: 1px dashed rgba(255, 255, 255, 0.28);
        border-radius: 8px;
        padding: 9px;
        background: rgba(255, 255, 255, 0.06);
      }

      .two {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 9px;
      }

      button {
        min-height: 42px;
        border: 0;
        border-radius: 8px;
        padding: 0 14px;
        cursor: pointer;
        font-weight: 700;
      }

      .primary { background: var(--blue); color: #fff; }
      .primary:hover { background: var(--blue-dark); }
      .secondary { background: #e9eef3; color: #21313d; }
      .secondary:hover { background: #dce5ec; }
      .ghost { background: rgba(255, 255, 255, 0.1); color: #fff; }
      .ghost:hover { background: rgba(255, 255, 255, 0.17); }

      .app {
        min-width: 0;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
      }

      .topbar {
        padding: 18px 24px;
        border-bottom: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.9);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .title h2 {
        margin: 0;
        color: var(--ink);
        font-size: 20px;
      }

      .title p {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 13px;
      }

      .layout {
        min-height: 0;
        padding: 22px 24px;
        display: grid;
        grid-template-columns: minmax(0, 1fr) 360px;
        gap: 18px;
      }

      .panel {
        min-height: 0;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        box-shadow: var(--shadow);
      }

      .chat-panel {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
      }

      .panel-head {
        padding: 16px 18px;
        border-bottom: 1px solid var(--line);
        display: flex;
        justify-content: space-between;
        gap: 12px;
      }

      .panel-head strong {
        color: var(--ink);
      }

      .mode {
        color: var(--muted);
        font-size: 12px;
      }

      .messages {
        overflow: auto;
        padding: 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .message {
        max-width: min(760px, 90%);
        display: grid;
        gap: 6px;
      }

      .message.user {
        align-self: flex-end;
      }

      .bubble {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 13px 14px;
        line-height: 1.65;
        white-space: pre-wrap;
        background: var(--soft);
      }

      .assistant .bubble {
        background: #fff;
      }

      .user .bubble {
        background: #dff0f5;
        border-color: #b8d8e0;
      }

      .meta {
        color: var(--muted);
        font-size: 12px;
      }

      .settings {
        padding: 16px;
        display: grid;
        gap: 12px;
        align-content: start;
      }

      .settings h3 {
        margin: 0;
        color: var(--ink);
        font-size: 15px;
      }

      .field {
        display: grid;
        gap: 6px;
      }

      .field label {
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
      }

      .text-input,
      .select-input {
        width: 100%;
        min-height: 42px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0 12px;
        color: var(--text);
        background: #fff;
      }

      .hint {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
      }

      .composer {
        padding: 16px 24px 22px;
        border-top: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.92);
      }

      .composer-inner {
        display: grid;
        grid-template-columns: 150px minmax(0, 1fr) auto;
        gap: 10px;
      }

      .send-wrap {
        display: flex;
        gap: 10px;
      }

      @media (max-width: 1080px) {
        .layout { grid-template-columns: 1fr; }
      }

      @media (max-width: 820px) {
        .shell { grid-template-columns: 1fr; }
        .topbar, .layout, .composer { padding-left: 16px; padding-right: 16px; }
        .topbar { align-items: flex-start; flex-direction: column; }
        .composer-inner { grid-template-columns: 1fr; }
        .send-wrap { display: grid; grid-template-columns: 1fr 1fr; }
        .message { max-width: 100%; }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="mark">AI</div>
          <div>
            <h1>Enterprise Assistant</h1>
            <p>LangChain RAG 工作台</p>
          </div>
        </div>

        <section class="side-card">
          <h2>知识库状态</h2>
          <div class="metrics">
            <div class="metric">
              <span>原始文档</span>
              <b id="doc-count">0</b>
            </div>
            <div class="metric">
              <span>向量片段</span>
              <b id="chunk-count">0</b>
            </div>
          </div>
          <div class="stack" id="stack-status">正在读取配置...</div>
        </section>

        <section class="side-card file-actions">
          <h2>资料上传</h2>
          <input id="file" type="file" accept=".txt,.md,.pdf,.docx" />
          <div class="two">
            <button id="upload" class="primary" type="button">上传</button>
            <button id="ingest" class="ghost" type="button">重建</button>
          </div>
        </section>

        <section class="side-card auth-row">
          <h2>访问令牌</h2>
          <input id="admin-token" class="text-input" type="password" placeholder="启用鉴权时填写 Admin Token" />
          <button id="save-token" class="ghost" type="button">保存到本机浏览器</button>
        </section>
      </aside>

      <main class="app">
        <header class="topbar">
          <div class="title">
            <h2>企业智能助手</h2>
            <p>可切换国产模型 API，上传资料后生成企业知识问答能力</p>
          </div>
          <div class="two">
            <button class="secondary" id="refresh" type="button">刷新状态</button>
            <button class="primary" id="sample" type="button">试问制度</button>
          </div>
        </header>

        <section class="layout">
          <div class="panel chat-panel">
            <div class="panel-head">
              <strong>对话</strong>
              <span class="mode">knowledge_search / policy_explain / calculator / current_time</span>
            </div>
            <div id="messages" class="messages">
              <div class="message assistant">
                <div class="bubble">你好，我会优先查企业知识库，并在回答里带上来源。右侧可以选择模型提供商并保存 API Key。</div>
                <div class="meta">系统就绪</div>
              </div>
            </div>
          </div>

          <aside class="panel settings">
            <h3>模型配置</h3>
            <div class="field">
              <label for="provider">模型提供商</label>
              <select id="provider" class="select-input"></select>
            </div>
            <div class="field">
              <label for="api-key">API Key</label>
              <input id="api-key" class="text-input" type="password" placeholder="留空则不覆盖已保存 Key" />
              <div id="api-key-hint" class="hint"></div>
            </div>
            <div class="field">
              <label for="base-url">Base URL</label>
              <input id="base-url" class="text-input" placeholder="可留空使用提供商默认地址" />
            </div>
            <div class="field">
              <label for="chat-model">聊天模型</label>
              <input id="chat-model" class="text-input" placeholder="可留空使用默认模型" />
            </div>
            <div class="field">
              <label for="embedding-provider">Embedding</label>
              <select id="embedding-provider" class="select-input">
                <option value="auto">auto</option>
                <option value="api">api</option>
                <option value="local">local</option>
              </select>
              <div class="hint">DeepSeek/Kimi 等可先用 local；Qwen/硅基流动可用 api。</div>
            </div>
            <div class="field">
              <label for="embedding-api-key">Embedding API Key</label>
              <input id="embedding-api-key" class="text-input" type="password" placeholder="留空则复用 API Key 或不覆盖" />
            </div>
            <div class="field">
              <label for="embedding-model">Embedding 模型</label>
              <input id="embedding-model" class="text-input" placeholder="例如 text-embedding-v4 / BAAI/bge-m3" />
            </div>
            <button id="save-settings" class="primary" type="button">保存模型配置</button>
            <div id="settings-hint" class="hint"></div>
          </aside>
        </section>

        <form id="chat-form" class="composer">
          <div class="composer-inner">
            <input id="session" class="text-input" value="user_001" aria-label="Session ID" />
            <input id="message" class="text-input" placeholder="输入问题，例如：年假制度怎么规定？" aria-label="消息" />
            <div class="send-wrap">
              <button class="secondary" type="button" id="clear">清屏</button>
              <button class="primary" type="submit">发送</button>
            </div>
          </div>
        </form>
      </main>
    </div>

    <script>
      const messages = document.querySelector("#messages");
      const form = document.querySelector("#chat-form");
      const sessionInput = document.querySelector("#session");
      const messageInput = document.querySelector("#message");
      const ingestButton = document.querySelector("#ingest");
      const uploadButton = document.querySelector("#upload");
      const refreshButton = document.querySelector("#refresh");
      const sampleButton = document.querySelector("#sample");
      const clearButton = document.querySelector("#clear");
      const fileInput = document.querySelector("#file");
      const adminTokenInput = document.querySelector("#admin-token");
      const saveTokenButton = document.querySelector("#save-token");
      const docCount = document.querySelector("#doc-count");
      const chunkCount = document.querySelector("#chunk-count");
      const stackStatus = document.querySelector("#stack-status");
      const providerSelect = document.querySelector("#provider");
      const apiKeyInput = document.querySelector("#api-key");
      const apiKeyHint = document.querySelector("#api-key-hint");
      const baseUrlInput = document.querySelector("#base-url");
      const chatModelInput = document.querySelector("#chat-model");
      const embeddingProviderInput = document.querySelector("#embedding-provider");
      const embeddingApiKeyInput = document.querySelector("#embedding-api-key");
      const embeddingModelInput = document.querySelector("#embedding-model");
      const saveSettingsButton = document.querySelector("#save-settings");
      const settingsHint = document.querySelector("#settings-hint");
      let providerPresets = [];

      function authHeaders() {
        const token = localStorage.getItem("enterprise_admin_token") || "";
        return token ? { Authorization: `Bearer ${token}` } : {};
      }

      function addMessage(role, content, meta = "") {
        const node = document.createElement("div");
        node.className = `message ${role}`;
        const bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.textContent = content;
        node.appendChild(bubble);
        if (meta) {
          const foot = document.createElement("div");
          foot.className = "meta";
          foot.textContent = meta;
          node.appendChild(foot);
        }
        messages.appendChild(node);
        messages.scrollTop = messages.scrollHeight;
      }

      async function postJson(url, payload) {
        const response = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json", ...authHeaders() },
          body: JSON.stringify(payload),
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.detail || `请求失败：${response.status}`);
        return data;
      }

      function applyProviderPreset() {
        const preset = providerPresets.find((item) => item.name === providerSelect.value);
        if (!preset) return;
        baseUrlInput.placeholder = preset.base_url || "自定义服务商需要填写";
        chatModelInput.placeholder = preset.chat_model || "请输入模型名";
        embeddingModelInput.placeholder = preset.embedding_model || "可留空使用本地 Embedding";
      }

      async function loadSettings() {
        const data = await fetch("/settings", { headers: authHeaders() }).then((res) => res.json());
        providerPresets = data.providers || [];
        providerSelect.innerHTML = providerPresets
          .map((item) => `<option value="${item.name}">${item.name}</option>`)
          .join("");
        providerSelect.value = data.model_provider;
        baseUrlInput.value = data.base_url || "";
        chatModelInput.value = data.chat_model || "";
        embeddingProviderInput.value = data.embedding_provider || "auto";
        embeddingModelInput.value = data.embedding_model || "";
        apiKeyHint.textContent = data.has_api_key ? `已保存：${data.api_key_masked}` : "尚未保存 API Key";
        settingsHint.textContent = `当前生效：${data.model_provider} / ${data.resolved_chat_model}`;
        applyProviderPreset();
      }

      async function refreshStatus() {
        try {
          const data = await fetch("/knowledge/status", { headers: authHeaders() }).then((res) => res.json());
          docCount.textContent = data.raw_documents;
          chunkCount.textContent = data.vector_chunks;
          stackStatus.textContent = `模型：${data.model_provider}/${data.chat_model} · 向量库：${data.vector_store} · Embedding：${data.embedding_provider}/${data.embedding_model}`;
        } catch {
          stackStatus.textContent = "服务未连接，请确认后端已启动。";
        }
      }

      async function sendMessage(message) {
        const text = message.trim();
        if (!text) return;
        addMessage("user", text);
        messageInput.value = "";
        try {
          const data = await postJson("/chat", {
            session_id: sessionInput.value.trim() || "default",
            message: text,
          });
          const meta = [
            data.tool_used ? `工具：${data.tool_used}` : "",
            data.sources?.length ? `来源：${data.sources.join("、")}` : "",
          ]
            .filter(Boolean)
            .join(" · ");
          addMessage("assistant", data.answer, meta);
        } catch (error) {
          addMessage("assistant", error.message);
        }
      }

      providerSelect.addEventListener("change", applyProviderPreset);

      saveTokenButton.addEventListener("click", () => {
        localStorage.setItem("enterprise_admin_token", adminTokenInput.value.trim());
        addMessage("assistant", "访问令牌已保存到当前浏览器。", "安全设置");
        loadSettings().then(refreshStatus);
      });

      saveSettingsButton.addEventListener("click", async () => {
        const payload = {
          model_provider: providerSelect.value,
          base_url: baseUrlInput.value.trim(),
          chat_model: chatModelInput.value.trim(),
          embedding_provider: embeddingProviderInput.value,
          embedding_model: embeddingModelInput.value.trim(),
        };
        if (apiKeyInput.value.trim()) payload.api_key = apiKeyInput.value.trim();
        if (embeddingApiKeyInput.value.trim()) {
          payload.embedding_api_key = embeddingApiKeyInput.value.trim();
        }
        saveSettingsButton.disabled = true;
        try {
          const data = await postJson("/settings", payload);
          apiKeyInput.value = "";
          embeddingApiKeyInput.value = "";
          apiKeyHint.textContent = data.has_api_key ? `已保存：${data.api_key_masked}` : "尚未保存 API Key";
          settingsHint.textContent = `已保存并生效：${data.model_provider} / ${data.resolved_chat_model}`;
          await refreshStatus();
        } catch (error) {
          settingsHint.textContent = error.message;
        } finally {
          saveSettingsButton.disabled = false;
        }
      });

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        await sendMessage(messageInput.value);
      });

      sampleButton.addEventListener("click", () => {
        messageInput.value = "年假制度怎么规定？";
        messageInput.focus();
      });

      clearButton.addEventListener("click", () => {
        messages.innerHTML = "";
        addMessage("assistant", "对话已清空，可以继续提问。", "系统");
      });

      uploadButton.addEventListener("click", async () => {
        const file = fileInput.files[0];
        if (!file) {
          addMessage("assistant", "请先选择一个 txt、md、pdf 或 docx 文件。");
          return;
        }
        const formData = new FormData();
        formData.append("file", file);
        uploadButton.disabled = true;
        try {
          const response = await fetch("/upload", { method: "POST", body: formData, headers: authHeaders() });
          const data = await response.json();
          if (!response.ok) throw new Error(data.detail || "上传失败");
          addMessage("assistant", `已上传：${data.filename}`, "资料上传");
          await refreshStatus();
        } catch (error) {
          addMessage("assistant", error.message);
        } finally {
          uploadButton.disabled = false;
        }
      });

      ingestButton.addEventListener("click", async () => {
        ingestButton.disabled = true;
        try {
          const data = await postJson("/ingest", { path: "./data/raw", reset: true });
          addMessage("assistant", `入库完成：${data.documents} 个文档，${data.chunks} 个片段。${data.message}`, "向量库");
          await refreshStatus();
        } catch (error) {
          addMessage("assistant", error.message);
        } finally {
          ingestButton.disabled = false;
        }
      });

      refreshButton.addEventListener("click", refreshStatus);
      adminTokenInput.value = localStorage.getItem("enterprise_admin_token") || "";
      loadSettings().then(refreshStatus);
    </script>
  </body>
</html>
